<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDIA Home — Product</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2; --sage: #8FA98A; --sage-light: #C8D9C5; --sage-dark: #5E7A59;
      --warm-beige: #EDE8DF; --tan: #C9B99A; --brown: #7A5C3E;
      --text-dark: #2D2A26; --text-mid: #6B6560; --text-light: #9C978F;
      --font-serif: 'Cormorant Garamond', serif; --font-sans: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--cream); color: var(--text-dark); min-height: 100vh; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 6%;
      background: rgba(250,247,242,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,185,154,0.25);
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
    .nav-logo { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 600; color: var(--text-dark); text-decoration: none; letter-spacing: 0.02em; flex-shrink: 0; }
    .nav-logo span { color: var(--sage-dark); }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); text-decoration: none; transition: color 0.2s; white-space: nowrap; }
    .nav-links a:hover { color: var(--text-dark); }
    .nav-shop { background: var(--sage-dark); color: white !important; padding: 0.5rem 1.2rem; border-radius: 2px; }
    .nav-shop:hover { background: var(--sage) !important; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--text-dark); border-radius: 2px; transition: all 0.3s; }
    .nav-mobile { display: none; position: fixed; top: 57px; left: 0; right: 0; background: rgba(250,247,242,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,185,154,0.25); padding: 1rem 6%; flex-direction: column; gap: 0; z-index: 99; }
    .nav-mobile.open { display: flex; }
    .nav-mobile a { font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); text-decoration: none; padding: 0.8rem 0; border-bottom: 1px solid #F0EDE8; transition: color 0.2s; }
    .nav-mobile a:last-child { border-bottom: none; }
    .nav-mobile a:hover { color: var(--sage-dark); }

    /* BREADCRUMB */
    .breadcrumb { padding: 6.5rem 6% 0; display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-light); }
    .breadcrumb a { color: var(--text-light); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--sage-dark); }
    .breadcrumb span { color: var(--text-mid); }

    /* PRODUCT PAGE */
    .product-page { max-width: 1200px; margin: 0 auto; padding: 2.5rem 6% 6rem; display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }

    /* IMAGE SIDE */
    .product-image-wrap { position: sticky; top: 7rem; }
    .product-main-img {
      width: 100%; aspect-ratio: 1 / 1; border-radius: 6px;
      background: var(--warm-beige); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .product-main-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-main-img .no-img { font-size: 5rem; opacity: 0.4; }
    .product-badge-wrap { margin-top: 1rem; display: flex; gap: 0.5rem; }
    .badge { display: inline-block; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
    .badge-new { background: #EBF2EA; color: var(--sage-dark); }
    .badge-sale { background: #FAF0EA; color: var(--brown); }

    /* INFO SIDE */
    .product-info { padding-top: 0.5rem; }
    .product-cat-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--sage-dark); margin-bottom: 0.7rem; }
    .product-title { font-family: var(--font-serif); font-size: 2.6rem; font-weight: 400; line-height: 1.15; color: var(--text-dark); margin-bottom: 1.5rem; }
    .product-price-wrap { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; }
    .price-main { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; color: var(--text-dark); }
    .price-orig { font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-light); text-decoration: line-through; }
    .price-save { font-size: 0.78rem; background: #FAF0EA; color: var(--brown); padding: 0.2rem 0.7rem; border-radius: 20px; font-weight: 500; }
    .divider { height: 1px; background: #E5E0D8; margin: 1.8rem 0; }
    .product-desc-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.8rem; }
    .product-desc { font-size: 0.9rem; line-height: 1.8; color: var(--text-mid); }
    .product-desc.empty { color: var(--text-light); font-style: italic; }

    /* ACTIONS */
    .product-actions { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .btn-cart {
      width: 100%; padding: 1rem 2rem; background: var(--sage-dark); color: white;
      border: none; border-radius: 3px; font-family: var(--font-sans);
      font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-cart:hover { background: var(--sage); }
    .btn-inquiry {
      width: 100%; padding: 1rem 2rem; background: transparent; color: var(--text-dark);
      border: 1px solid #C9B99A; border-radius: 3px; font-family: var(--font-sans);
      font-size: 0.85rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; text-align: center;
    }
    .btn-inquiry:hover { background: var(--text-dark); color: white; border-color: var(--text-dark); }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--text-light); text-decoration: none; margin-bottom: 2rem; transition: color 0.2s; }
    .back-link:hover { color: var(--sage-dark); }

    /* LOADING / ERROR */
    .state-wrap { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3rem; }
    .state-icon { font-size: 3.5rem; margin-bottom: 1.2rem; }
    .state-title { font-family: var(--font-serif); font-size: 1.8rem; margin-bottom: 0.5rem; }
    .state-sub { font-size: 0.88rem; color: var(--text-light); margin-bottom: 2rem; }
    .btn-back-home { display: inline-block; padding: 0.75rem 2rem; background: var(--sage-dark); color: white; text-decoration: none; border-radius: 3px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.2s; }
    .btn-back-home:hover { background: var(--sage); }

    /* RELATED */
    .related-section { max-width: 1200px; margin: 0 auto; padding: 0 6% 6rem; }
    .related-title { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400; margin-bottom: 2rem; }
    .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .related-card { cursor: pointer; transition: transform 0.2s; }
    .related-card:hover { transform: translateY(-4px); }
    .related-img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; background: var(--warm-beige); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden; margin-bottom: 0.8rem; }
    .related-img img { width: 100%; height: 100%; object-fit: cover; }
    .related-cat { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.3rem; }
    .related-name { font-size: 0.88rem; font-weight: 500; color: var(--text-dark); margin-bottom: 0.3rem; }
    .related-price { font-family: var(--font-serif); font-size: 1rem; color: var(--text-dark); }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--text-dark); color: white; padding: 0.85rem 1.4rem; border-radius: 4px; font-size: 0.82rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 9999; border-left: 3px solid var(--sage-dark); }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* IMAGE THUMBNAILS */
    .thumb-row { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .thumb { width: 68px; height: 68px; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; background: var(--warm-beige); flex-shrink: 0; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb.active { border-color: var(--sage-dark); }
    .thumb:hover { border-color: var(--tan); }
    .product-main-img img { transition: opacity 0.2s; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; gap: 2rem; }
      .product-image-wrap { position: static; }
      .product-title { font-size: 2rem; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .thumb { width: 56px; height: 56px; }
    }
    @media (max-width: 860px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>

<div id="app">
  <div class="state-wrap">
    <div class="state-icon">⏳</div>
    <div class="state-title">Loading product…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://whcbwehvdskxzvbijfxh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoY2J3ZWh2ZHNreHp2YmlqZnhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTYyNjcsImV4cCI6MjA4ODg5MjI2N30.o2o8avqLbGR9pIaVTejdEkuYayQ1SlHJqhf44hOE7gA';

  const CAT_LABEL = { sofa:'Sofas', bed:'Beds', table:'Tables', storage:'Storage', decor:'Décor' };
  const CAT_EMOJI = { sofa:'🛋️', bed:'🛏️', table:'🍽️', storage:'🗄️', decor:'🪴' };

  // Sticky nav
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30);
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function fetchProduct(id) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/products?id=eq.' + id, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) throw new Error('Fetch failed');
    const data = await res.json();
    return data[0] || null;
  }

  async function fetchRelated(category, excludeId) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/products?category=eq.' + category + '&id=neq.' + excludeId + '&limit=4', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) return [];
    return await res.json();
  }

  function renderProduct(p) {
    const catLabel = CAT_LABEL[p.category] || p.category;
    const catEmoji = CAT_EMOJI[p.category] || '📦';

    // Build images array — use images[] if available, fallback to single image
    const allImages = (p.images && Array.isArray(p.images) && p.images.length > 0)
      ? p.images
      : (p.image ? [p.image] : []);

    const imgHTML = allImages.length > 0
      ? `<img id="mainImg" src="${allImages[0]}" alt="${p.name}" onerror="this.style.display='none';document.getElementById('noImg').style.display='flex'">`
      : '';

    const thumbsHTML = allImages.length > 1
      ? `<div class="thumb-row">${allImages.map((url, i) =>
          `<div class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImg('${url}', this)">
            <img src="${url}" alt="View ${i+1}">
          </div>`
        ).join('')}</div>`
      : '';

    const badgeHTML = p.badge === 'new'
      ? `<span class="badge badge-new">New Arrival</span>`
      : p.badge === 'sale'
      ? `<span class="badge badge-sale">On Sale</span>`
      : '';

    const savings = p.orig_price ? Math.round((1 - p.price / p.orig_price) * 100) : 0;
    const origHTML = p.orig_price
      ? `<span class="price-orig">₱${Number(p.orig_price).toLocaleString()}</span>
         <span class="price-save">Save ${savings}%</span>`
      : '';

    const descHTML = p.description
      ? `<p class="product-desc">${p.description.replace(/\n/g, '<br>')}</p>`
      : `<p class="product-desc empty">No description available.</p>`;

    document.title = `${p.name} — EDIA Home`;

    document.getElementById('app').innerHTML = `
      <div class="breadcrumb">
        <a href="/">Home</a> › 
        <a href="/#products-section">${catLabel}</a> › 
        <span>${p.name}</span>
      </div>

      <div class="product-page">
        <div class="product-image-wrap">
          <div class="product-main-img">
            ${imgHTML}
            <div id="noImg" class="no-img" style="${allImages.length > 0 ? 'display:none' : 'display:flex'}">${catEmoji}</div>
          </div>
          ${thumbsHTML}
          ${badgeHTML ? `<div class="product-badge-wrap">${badgeHTML}</div>` : ''}
        </div>

        <div class="product-info">
          <a href="/#products-section" class="back-link">← Back to Products</a>
          <div class="product-cat-label">${catLabel}</div>
          <h1 class="product-title">${p.name}</h1>

          <div class="product-price-wrap">
            <span class="price-main">₱${Number(p.price).toLocaleString()}</span>
            ${origHTML}
          </div>

          <div class="divider"></div>

          <div class="product-desc-label">About this Product</div>
          ${descHTML}

          <div class="product-actions">
            <button class="btn-cart" onclick="addToCart('${p.name}')">🛒 Add to Cart</button>
            <a href="/#contact" class="btn-inquiry">Send Inquiry</a>
          </div>
        </div>
      </div>

      <div id="related-wrap"></div>
    `;

    // Load related products
    fetchRelated(p.category, p.id).then(related => {
      if (!related.length) return;
      document.getElementById('related-wrap').innerHTML = `
        <div class="related-section">
          <div class="related-title">You Might Also Like</div>
          <div class="related-grid">
            ${related.map(r => `
              <div class="related-card" onclick="window.location.href='product.html?id=${r.id}'">
                <div class="related-img">
                  ${r.image
                    ? `<img src="${r.image}" alt="${r.name}" onerror="this.parentElement.innerHTML='${CAT_EMOJI[r.category] || '📦'}'">` 
                    : CAT_EMOJI[r.category] || '📦'}
                </div>
                <div class="related-cat">${CAT_LABEL[r.category] || r.category}</div>
                <div class="related-name">${r.name}</div>
                <div class="related-price">₱${Number(r.price).toLocaleString()}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
  }

  function addToCart(name) {
    showToast('🛒 "' + name + '" added to cart!');
  }

  function toggleMobileNav() {
    document.getElementById('mobileNav').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
  }

  function switchImg(url, thumbEl) {
    const mainImg = document.getElementById('mainImg');
    if (mainImg) {
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = url;
        mainImg.style.opacity = '1';
      }, 150);
    }
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    if (thumbEl) thumbEl.classList.add('active');
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('app').innerHTML = `
        <div class="state-wrap">
          <div class="state-icon">😕</div>
          <div class="state-title">Product not found</div>
          <div class="state-sub">No product ID was provided.</div>
          <a href="/" class="btn-back-home">← Back to Home</a>
        </div>`;
      return;
    }

    try {
      const product = await fetchProduct(id);
      if (!product) {
        document.getElementById('app').innerHTML = `
          <div class="state-wrap">
            <div class="state-icon">🔍</div>
            <div class="state-title">Product not found</div>
            <div class="state-sub">This product may have been removed or doesn't exist.</div>
            <a href="/" class="btn-back-home">← Back to Home</a>
          </div>`;
        return;
      }
      renderProduct(product);
    } catch(e) {
      console.error(e);
      document.getElementById('app').innerHTML = `
        <div class="state-wrap">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Something went wrong</div>
          <div class="state-sub">Could not load the product. Please try again.</div>
          <a href="/" class="btn-back-home">← Back to Home</a>
        </div>`;
    }
  }

  init();
</script>
</body>
